<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>{{ page.title }} — Vee Labs</title>
  <meta name="description" content="{{ site.description }}" />
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;700&family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    :root {
      --bg: #080c14; --surface: #0e1523; --border: #1b2840;
      --green: #34d399; --cyan: #22d3ee; --text: #c8d6e8;
      --dim: #566580; --bright: #eef2f8;
    }
    body {
      background: var(--bg); color: var(--text);
      font-family: 'Inter', system-ui, sans-serif;
      font-size: 15px; line-height: 1.7;
    }
    body::before {
      content: ''; position: fixed; inset: 0;
      background-image:
        linear-gradient(rgba(52,211,153,.03) 1px, transparent 1px),
        linear-gradient(90deg, rgba(52,211,153,.03) 1px, transparent 1px);
      background-size: 40px 40px; pointer-events: none; z-index: 0;
    }
    nav {
      position: sticky; top: 0; z-index: 100;
      display: flex; align-items: center; justify-content: space-between;
      padding: 0 2rem; height: 58px;
      background: rgba(8,12,20,.92); backdrop-filter: blur(12px);
      border-bottom: 1px solid var(--border);
    }
    .logo {
      display: flex; align-items: center; gap: .55rem;
      text-decoration: none; color: var(--bright);
      font-weight: 700; font-size: 1rem;
    }
    .logo-icon {
      width: 26px; height: 26px;
      background: linear-gradient(135deg, var(--green), var(--cyan));
      border-radius: 6px; display: flex; align-items: center; justify-content: center;
      font-size: .7rem; font-family: 'JetBrains Mono', monospace;
      color: #080c14; font-weight: 700;
    }
    nav a { color: var(--dim); text-decoration: none; font-size: .85rem; }
    nav a:hover { color: var(--bright); }
    main {
      position: relative; z-index: 1;
      max-width: 860px; margin: 0 auto;
      padding: 3rem 1.5rem 4rem;
    }
    h1 { font-size: 1.9rem; font-weight: 700; color: var(--bright); margin-bottom: 1rem; }
    h2 { font-size: 1.3rem; font-weight: 700; color: var(--bright); margin: 2rem 0 .5rem; }
    p { color: var(--dim); margin-bottom: .75rem; }
    a { color: var(--green); text-decoration: none; }
    a:hover { text-decoration: underline; }
    table { width: 100%; border-collapse: collapse; margin: 1.5rem 0; font-size: .88rem; }
    th { text-align: left; padding: .5rem .75rem; border-bottom: 1px solid var(--border);
         font-family: 'JetBrains Mono', monospace; font-size: .72rem; color: var(--dim); }
    td { padding: .5rem .75rem; border-bottom: 1px solid var(--border); color: var(--text); }
    code { font-family: 'JetBrains Mono', monospace; font-size: .82rem;
           background: #0e1523; padding: .1rem .4rem; border-radius: 4px; color: var(--green); }
    pre { background: #0e1523; border: 1px solid var(--border); border-radius: 8px;
          padding: 1rem; overflow-x: auto; margin: 1rem 0; }
    pre code { background: none; padding: 0; }
    footer {
      position: relative; z-index: 1;
      max-width: 860px; margin: 0 auto;
      padding: 1.5rem; border-top: 1px solid var(--border);
      font-family: 'JetBrains Mono', monospace; font-size: .72rem; color: var(--dim);
    }
  </style>
</head>
<body>
<nav>
  <a href="/" class="logo">
    <div class="logo-icon">VL</div>
    Vee Labs
  </a>
  <a href="https://github.com/vee-labs" target="_blank" rel="noopener">GitHub →</a>
</nav>
<main>
  {{ content }}
</main>
<footer>© 2025 Vee Labs · GitHub Pages</footer>
</body>
</html>
